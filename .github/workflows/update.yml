name: Nightly Update

on:
  schedule:
# Runs at 8:13 UTC (3:13 EST)
    - cron: '13 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: personal-packages-cache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: "(github-copilot-cli|warp-terminal|wavebox|ArtixGameLauncher)"

      - name: Update Flake inputs
        run: nix flake update

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x update.sh
          ./update.sh
    
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated package updates"
          title: "chore: automated package updates"
          body: "Automated updates generated by `update.sh`."
          branch: "nightly-updates"
          delete-branch: true

      - name: Checkout PR branch
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: git checkout nightly-updates

      - name: Build packages
        id: build
        run: |
          set -o pipefail
          for pkg in gemini-cli gemini-cli-bin neovimConfigured kando gh-aw github-copilot-cli warp-terminal wavebox ArtixGameLauncher; do
            echo "Building $pkg..."
            nix build .#$pkg --no-link
          done

      - name: Merge Pull Request
        if: always() && steps.cpr.outputs.pull-request-operation == 'created' && steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --merge --delete-branch

      - name: Trigger fix-build-failure workflow
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run fix-build-failure.lock.yml -f run_id=${{ github.run_id }}
